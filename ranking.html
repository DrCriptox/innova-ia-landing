<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>InnovaIA — Ranking</title>
<style>
:root{--gold:#D4AB53;--dark:#060810;--dark-2:#0C0F1A;--card:#0E1219;--text:#EAECF4;--muted:#7A8099;--border:rgba(255,255,255,.07);}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--dark);color:var(--text);font-family:'Segoe UI',sans-serif;min-height:100vh;padding-bottom:40px;}
.topbar{display:flex;align-items:center;justify-content:center;padding:22px 20px 12px;flex-direction:column;}
.brand{font-size:2.3rem;font-weight:800;letter-spacing:-1px;margin-bottom:5px;}
.brand span{color:var(--gold);}
.brand-sub{color:var(--muted);font-size:.88rem;letter-spacing:3px;text-transform:uppercase;margin-bottom:16px;}
.tab-bar{display:flex;gap:4px;border-bottom:1px solid var(--border);padding:0 12px;justify-content:center;margin-bottom:16px;flex-wrap:wrap;}
.tab-btn{background:none;border:none;color:var(--muted);font-size:.88rem;font-weight:600;padding:10px 18px;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap;}
.tab-btn:hover{background:rgba(255,255,255,.04);}
.tab-btn.active{color:var(--gold);border-bottom-color:var(--gold);background:rgba(212,168,83,.05);}
.panel{padding:0 12px;max-width:680px;margin:0 auto;}
.promo-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px;}
.promo-subtitle{font-size:.78rem;color:var(--muted);}
.refresh-btn{background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:8px;color:var(--muted);padding:5px 12px;font-size:.78rem;cursor:pointer;}
.refresh-btn:hover{color:var(--text);}
.live-badge{display:inline-flex;align-items:center;gap:5px;font-size:.7rem;color:#4ade80;font-weight:600;}
.live-dot{width:7px;height:7px;border-radius:50%;background:#4ade80;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}
.promo-grid{display:flex;flex-direction:column;gap:6px;}
.no-visits{text-align:center;color:var(--muted);padding:40px 20px;font-size:.88rem;}
.promo-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:7px 18px;display:flex;align-items:center;gap:12px;transition:border-color .2s;}
.promo-card:hover{border-color:rgba(212,168,83,.35);}
.promo-card.rank1{border-color:rgba(255,215,0,.4);background:rgba(255,215,0,.04);}
.promo-card.rank2{border-color:rgba(192,192,192,.35);background:rgba(192,192,192,.03);}
.promo-card.rank3{border-color:rgba(205,127,50,.35);background:rgba(205,127,50,.03);}
.rank-num{font-size:1.15rem;min-width:36px;text-align:center;line-height:1;}
.promo-av{width:34px;height:34px;border-radius:50%;object-fit:cover;border:2px solid var(--border);flex-shrink:0;}
.promo-avph{width:34px;height:34px;border-radius:50%;background:var(--dark-2);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:.94rem;flex-shrink:0;}
.promo-info{flex:1;min-width:0;}
.promo-name{font-weight:700;font-size:.98rem;color:#fff;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.promo-name-row{display:flex;align-items:center;gap:5px;flex-wrap:wrap;min-width:0;}
.promo-ref{color:var(--muted);font-size:.7rem;font-family:monospace;white-space:nowrap;flex-shrink:0;}
.promo-right{text-align:right;flex-shrink:0;}
.promo-visits{font-size:1.08rem;font-weight:800;color:var(--gold);line-height:1;}
.promo-label{font-size:.66rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:2px;}
.promo-ip-row{display:flex;gap:5px;margin-top:4px;flex-wrap:wrap;}
.v-chip{font-size:.67rem;padding:2px 7px;border-radius:20px;font-weight:600;}
.v-chip.unicas{background:rgba(37,211,102,.12);color:#25D366;border:1px solid rgba(37,211,102,.25);}
.v-chip.sospechosas{background:rgba(255,165,0,.1);color:#FFA500;border:1px solid rgba(255,165,0,.2);}
.bar-wrap{height:3px;background:rgba(255,255,255,.06);border-radius:4px;margin-top:6px;overflow:hidden;}
.bar-fill{height:100%;background:var(--gold);border-radius:4px;}
</style>
</head>
<body>
<div class="topbar">
  <div class="brand">Innova<span>IA</span></div>
  <div class="brand-sub">Ranking de Promotores</div>
</div>
<div class="tab-bar">
  <button id="tabBtnHoy" class="tab-btn active" onclick="switchTab('hoy')">☀️ Top Hoy</button>
  <button id="tabBtnSemanal" class="tab-btn" onclick="switchTab('semanal')">📅 Top Semanal</button>
  <button id="tabBtnMensual" class="tab-btn" onclick="switchTab('mensual')">🗓️ Top Mensual</button>
</div>
<div id="panelHoy" class="panel">
  <div class="promo-header">
    <span class="promo-subtitle" id="hoySubtitle">Cargando...</span>
    <span class="live-badge"><span class="live-dot"></span>En vivo · 30s</span>
  </div>
  <div class="promo-grid" id="hoyGrid"><div class="no-visits">Cargando...</div></div>
</div>
<div id="panelSemanal" class="panel" style="display:none">
  <div class="promo-header">
    <span class="promo-subtitle" id="semanalSubtitle">Cargando...</span>
    <span class="live-badge"><span class="live-dot"></span>En vivo · 30s</span>
  </div>
  <div class="promo-grid" id="semanalGrid"><div class="no-visits">Cargando...</div></div>
</div>
<div id="panelMensual" class="panel" style="display:none">
  <div class="promo-header">
    <span class="promo-subtitle" id="mensualSubtitle">Cargando...</span>
    <span class="live-badge"><span class="live-dot"></span>En vivo · 30s</span>
  </div>
  <div class="promo-grid" id="mensualGrid"><div class="no-visits">Cargando...</div></div>
</div>
<script>
var statsData={},allData=[];
function parseEntry(e){
  if(!e)return{total:0,uniq:0,suspicious:0,conversions:0,legacy:true};
  if(typeof e==='number')return{total:e,uniq:0,suspicious:0,conversions:0,legacy:true};
  var ips=e.ips||{},vals=Object.values(ips);
  return{total:e.total||0,uniq:Object.keys(ips).length,suspicious:vals.filter(function(c){return c>1;}).length,conversions:e.conversions||0,legacy:false};
}
function sanitize(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function phoneFlag(tel,pais){
  var code='';
  if(pais){code=pais.toUpperCase();}
  else{
    if(!tel)return '';
    var t=tel.toString().replace(/\D/g,'');
    if(t.startsWith('57')||/^3\d{9}$/.test(t))code='CO';
    else if(t.startsWith('58')||(t.startsWith('04')&&t.length===11))code='VE';
    else if(t.startsWith('1'))code='US';
    else if(t.startsWith('52'))code='MX';
    else if(t.startsWith('54'))code='AR';
    else if(t.startsWith('51'))code='PE';
    else if(t.startsWith('56'))code='CL';
    else if(t.startsWith('593'))code='EC';
    else if(t.startsWith('591'))code='BO';
    else if(t.startsWith('595'))code='PY';
    else if(t.startsWith('598'))code='UY';
    else if(t.startsWith('34'))code='ES';
    else if(t.startsWith('55'))code='BR';
    else if(t.startsWith('507'))code='PA';
    else if(t.startsWith('506'))code='CR';
    else if(t.startsWith('1809')||t.startsWith('1829')||t.startsWith('1849'))code='DO';
    else if(t.startsWith('351'))code='PT';
    else return '';
  }
  return '<img src="https://flagcdn.com/20x15/'+code.toLowerCase()+'.png" alt="'+code+'" title="'+code+'" style="width:18px;height:14px;vertical-align:middle;border-radius:2px;margin-left:3px;flex-shrink:0;">';
}
function colOff(days){return new Date(Date.now()-18000000+(days||0)*86400000).toISOString().split('T')[0];}
function dateRange(a,b){
  var dates=[],c=new Date(a+'T12:00:00Z'),e=new Date(b+'T12:00:00Z');
  while(c<=e){dates.push(c.toISOString().split('T')[0]);c.setUTCDate(c.getUTCDate()+1);}
  return dates;
}
function weekDates(){
  var now=new Date(Date.now()-18000000),dow=now.getUTCDay(),dtm=dow===0?6:dow-1;
  return dateRange(colOff(-dtm),colOff(6-dtm));
}
function monthDates(){
  var now=new Date(Date.now()-18000000),y=now.getUTCFullYear(),m=now.getUTCMonth();
  return dateRange(new Date(Date.UTC(y,m,1)).toISOString().split('T')[0],new Date(Date.UTC(y,m+1,0)).toISOString().split('T')[0]);
}
function fmtDate(d){var mo=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'],p=d.split('-');return parseInt(p[2])+' '+mo[parseInt(p[1])-1];}
function aggregateRange(raw,dates){
  var total=0,ips={},convs=0;
  dates.forEach(function(d){
    total+=(raw&&raw.days&&raw.days[d])?raw.days[d]:0;
    if(raw&&raw.days_ips&&raw.days_ips[d])
      Object.entries(raw.days_ips[d]).forEach(function(e){ips[e[0]]=(ips[e[0]]||0)+e[1];});
    convs+=(raw&&raw.days_conversions&&raw.days_conversions[d])?raw.days_conversions[d]:0;
  });
  var uniq=Object.keys(ips).length,susp=Object.values(ips).filter(function(c){return c>1;}).length;
  return{total:total,uniq:uniq,susp:susp,adj:Math.max(0,total-susp*2),conversions:convs};
}
function buildCard(pfx,e,i,lbl,maxV){
  var rk=i+1,rc=rk<=3?'rank'+rk:'',rd=rk<=3?['🥇','🥈','🥉'][i]:rk;
  var nm=e.a?sanitize(e.a.nombre||e.ref):'<span style="color:var(--muted);font-style:italic">'+e.ref+'</span>';
  var flag=e.a?phoneFlag(e.a.whatsapp||e.a.telefono||'',e.a.pais||''):'';
  var conv=e.conversions||0,adj=e.adj,pct=Math.round((adj/maxV)*100);
  var tasa=adj>0&&conv>0?Math.round((conv/adj)*100):0,tc=tasa>=20?'#4ade80':tasa>=10?'var(--gold)':'#FF8888';
  var h='<div class="promo-card '+rc+'"><div class="rank-num">'+rd+'</div>';
  h+='<div id="'+pfx+i+'"><div class="promo-avph">👤</div></div>';
  h+='<div class="promo-info"><div class="promo-name-row"><span class="promo-name">'+nm+(flag?' '+flag:'')+'</span><span class="promo-ref">('+e.ref+')</span></div>';
  if(e.uniq>0){h+='<div class="promo-ip-row"><span class="v-chip unicas">🟢 '+e.uniq+' únicas</span>';if(e.susp>0)h+='<span class="v-chip sospechosas">⚠ '+e.susp+' susp.</span>';h+='</div>';}
  h+='<div class="bar-wrap"><div class="bar-fill" style="width:'+pct+'%"></div></div>';
  h+='</div><div class="promo-right"><div class="promo-visits">'+adj.toLocaleString('es-CO')+'</div><div class="promo-label">'+lbl+'</div>';
  if(conv>0){h+='<div style="font-size:.82rem;font-weight:700;color:#4ade80;margin-top:3px;">'+conv+' conv.</div><div style="font-size:.7rem;color:'+tc+';font-weight:700;">'+tasa+'%</div>';}
  else{h+='<div style="font-size:.7rem;color:var(--muted);margin-top:3px;">0 conv.</div>';}
  return h+'</div></div>';
}
function loadAvatars(entries,pfx){
  entries.forEach(function(e,i){
    if(!e.a||!e.a.foto)return;
    var src=e.a.foto.indexOf('fotos/')===0?'/'+e.a.foto:e.a.foto;
    var img=new Image();img.className='promo-av';img.src=src;
    img.onerror=function(){this.parentNode.innerHTML='<div class="promo-avph">👤</div>';};
    var el=document.getElementById(pfx+i);if(el){el.innerHTML='';el.appendChild(img);}
  });
}
function renderHoy(){
  var today=new Date(Date.now()-18000000).toISOString().split('T')[0];
  var entries=Object.entries(statsData).map(function(e){
    var raw=e[1],p=parseEntry(raw);
    var hoy=(raw&&raw.days)?(raw.days[today]||0):0;
    var dips=(raw&&raw.days_ips&&raw.days_ips[today])?raw.days_ips[today]:null;
    var uniq=dips?Object.keys(dips).length:0,susp=dips?Object.values(dips).filter(function(c){return c>1;}).length:0;
    var convHoy=(raw&&raw.days_conversions&&raw.days_conversions[today])?raw.days_conversions[today]:0;
    var a=allData.find(function(x){return x.slug===e[0];})||null;
    return{ref:e[0],p:p,total:hoy,adj:Math.max(0,hoy-susp*2),a:a,uniq:uniq,susp:susp,conversions:convHoy};
  }).filter(function(e){return e.total>0;}).sort(function(a,b){return b.adj-a.adj;}).slice(0,20);
  var totV=entries.reduce(function(s,e){return s+e.total;},0),totC=entries.reduce(function(s,e){return s+(e.conversions||0);},0);
  document.getElementById('hoySubtitle').textContent=entries.length+' promotor'+(entries.length!==1?'es':'')+' · '+totV.toLocaleString('es-CO')+' visitas hoy · '+totC+' conv.';
  if(!entries.length){document.getElementById('hoyGrid').innerHTML='<div class="no-visits">Aún no hay visitas hoy. 😊</div>';return;}
  var maxV=entries[0].adj||1;
  document.getElementById('hoyGrid').innerHTML=entries.map(function(e,i){return buildCard('hav',e,i,'hoy',maxV);}).join('');
  loadAvatars(entries,'hav');
}
function renderSemanal(){
  var dates=weekDates();
  var entries=Object.entries(statsData).map(function(e){
    var raw=e[1],p=parseEntry(raw),agg=aggregateRange(raw,dates);
    var a=allData.find(function(x){return x.slug===e[0];})||null;
    return{ref:e[0],p:p,total:agg.total,adj:agg.adj,a:a,uniq:agg.uniq,susp:agg.susp,conversions:agg.conversions};
  }).filter(function(e){return e.total>0;}).sort(function(a,b){return b.adj-a.adj;}).slice(0,20);
  var totV=entries.reduce(function(s,e){return s+e.total;},0),totC=entries.reduce(function(s,e){return s+(e.conversions||0);},0);
  document.getElementById('semanalSubtitle').textContent=entries.length+' promotor'+(entries.length!==1?'es':'')+' · '+totV.toLocaleString('es-CO')+' visitas · '+totC+' conv. ('+fmtDate(dates[0])+' – '+fmtDate(dates[dates.length-1])+')';
  if(!entries.length){document.getElementById('semanalGrid').innerHTML='<div class="no-visits">Sin visitas esta semana.</div>';return;}
  var maxV=entries[0].adj||1;
  document.getElementById('semanalGrid').innerHTML=entries.map(function(e,i){return buildCard('sav',e,i,'semana',maxV);}).join('');
  loadAvatars(entries,'sav');
}
function renderMensual(){
  var dates=monthDates(),now=new Date(Date.now()-18000000);
  var mo=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  var ml=mo[now.getUTCMonth()]+' '+now.getUTCFullYear();
  var entries=Object.entries(statsData).map(function(e){
    var raw=e[1],p=parseEntry(raw),agg=aggregateRange(raw,dates);
    var a=allData.find(function(x){return x.slug===e[0];})||null;
    return{ref:e[0],p:p,total:agg.total,adj:agg.adj,a:a,uniq:agg.uniq,susp:agg.susp,conversions:agg.conversions};
  }).filter(function(e){return e.total>0;}).sort(function(a,b){return b.adj-a.adj;}).slice(0,20);
  var totV=entries.reduce(function(s,e){return s+e.total;},0),totC=entries.reduce(function(s,e){return s+(e.conversions||0);},0);
  document.getElementById('mensualSubtitle').textContent=entries.length+' promotor'+(entries.length!==1?'es':'')+' · '+totV.toLocaleString('es-CO')+' visitas · '+totC+' conv. ('+ml+')';
  if(!entries.length){document.getElementById('mensualGrid').innerHTML='<div class="no-visits">Sin visitas este mes.</div>';return;}
  var maxV=entries[0].adj||1;
  document.getElementById('mensualGrid').innerHTML=entries.map(function(e,i){return buildCard('mav',e,i,'mes',maxV);}).join('');
  loadAvatars(entries,'mav');
}
async function loadData(){
  try{
    var r=await fetch('/api/stats?_t='+Date.now());
    statsData=await r.json();
    if(!allData.length){
      var r2=await fetch('/api/asesores?_t='+Date.now());
      var raw=await r2.json();
      allData=Object.entries(raw).filter(function(e){return e[0]!=='default';}).map(function(e){return Object.assign({slug:e[0]},e[1]);});
    }
    if(document.getElementById('panelHoy').style.display!=='none')renderHoy();
    if(document.getElementById('panelSemanal').style.display!=='none')renderSemanal();
    if(document.getElementById('panelMensual').style.display!=='none')renderMensual();
  }catch(ex){console.error(ex);}
}
function switchTab(tab){
  ['hoy','semanal','mensual'].forEach(function(t){
    var k=t.charAt(0).toUpperCase()+t.slice(1);
    document.getElementById('tabBtn'+k).classList.toggle('active',t===tab);
    document.getElementById('panel'+k).style.display=t===tab?'block':'none';
  });
  loadData();
}
loadData();
setInterval(loadData,30000);
</script>
</body>
</html>
