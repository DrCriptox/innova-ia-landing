<!-- v3 -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>InnovaIA — Panel Asesores</title>
<style>
:root{--gold:#D4A853;--gold-light:#F0C97A;--dark:#060810;--dark-2:#0C0F1A;--card:#0E1219;--text:#EAECF4;--muted:#7A8099;--green:#25D366;--border:rgba(212,168,83,0.15);--red:#FF4F4F;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--dark);color:var(--text);font-family:'Segoe UI',sans-serif;min-height:100vh;}
#loginWrap{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;}
.login-box{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:44px 36px;width:100%;max-width:400px;text-align:center;}
.brand{font-size:2rem;font-weight:800;letter-spacing:-1px;margin-bottom:4px;}
.brand span{color:var(--gold);}
.brand-sub{color:var(--muted);font-size:.78rem;letter-spacing:3px;text-transform:uppercase;margin-bottom:32px;}
input[type=password]{width:100%;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:10px;padding:14px 16px;color:var(--text);font-size:.95rem;outline:none;margin-bottom:14px;transition:border .2s;}
input[type=password]:focus{border-color:var(--gold);}
input[type=text]{width:100%;max-width:380px;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:10px;padding:11px 16px;color:var(--text);font-size:.9rem;outline:none;transition:border .2s;}
input[type=text]:focus{border-color:var(--gold);}
.btn-gold{width:100%;background:var(--gold);color:#000;border:none;border-radius:10px;padding:14px;font-size:1rem;font-weight:700;cursor:pointer;transition:background .2s;}
.btn-gold:hover{background:var(--gold-light);}
.err{color:var(--red);font-size:.83rem;margin-top:10px;min-height:18px;}
#dashboard{display:none;padding:24px 20px 60px;}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px;}
.topbrand{font-size:1.25rem;font-weight:800;}
.topbrand span{color:var(--gold);}
.badges{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.badge{border-radius:100px;padding:5px 14px;font-size:.76rem;font-weight:600;border:1px solid;}
.badge-green{background:rgba(37,211,102,.08);border-color:rgba(37,211,102,.25);color:#4ade80;}
.badge-gold{background:rgba(212,168,83,.1);border-color:var(--border);color:var(--gold);}
.btn-out{background:rgba(255,79,79,.1);border:1px solid rgba(255,79,79,.3);color:var(--red);border-radius:8px;padding:6px 14px;font-size:.76rem;cursor:pointer;font-weight:600;}
.tab-bar{display:flex;gap:6px;margin-bottom:18px;border-bottom:1px solid var(--border);padding-bottom:0;}
.tab-btn{background:none;border:none;color:var(--muted);font-size:.88rem;font-weight:600;padding:10px 20px;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .2s;border-radius:8px 8px 0 0;}
.tab-btn:hover{color:var(--text);background:rgba(255,255,255,.04);}
.tab-btn.active{color:var(--gold);border-bottom-color:var(--gold);background:rgba(212,168,83,.05);}
.search-row{margin-bottom:16px;}
.table-wrap{border-radius:14px;border:1px solid var(--border);overflow:hidden;overflow-x:auto;}
table{width:100%;border-collapse:collapse;min-width:700px;}
thead{background:rgba(212,168,83,.06);}
th{padding:12px 14px;text-align:left;font-size:.7rem;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);font-weight:600;border-bottom:1px solid var(--border);white-space:nowrap;}
td{padding:10px 14px;font-size:.87rem;border-bottom:1px solid rgba(255,255,255,.04);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(255,255,255,.02);}
.av{width:40px;height:40px;border-radius:50%;object-fit:cover;border:2px solid var(--border);}
.avph{width:40px;height:40px;border-radius:50%;background:var(--dark-2,#111);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:1.1rem;}
.nm{font-weight:600;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.rl{color:var(--muted);font-size:.78rem;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.pill{display:inline-block;background:rgba(212,168,83,.1);border:1px solid var(--border);border-radius:6px;padding:3px 10px;font-size:.76rem;color:var(--gold);font-family:monospace;cursor:pointer;transition:all .2s;white-space:nowrap;}
.pill:hover{background:rgba(212,168,83,.22);}
.wa{color:#4ade80;text-decoration:none;font-size:.84rem;}
.wa:hover{text-decoration:underline;}
.dt{color:var(--muted);font-size:.78rem;white-space:nowrap;}
.v-cell{display:flex;flex-direction:column;gap:3px;min-width:90px;}
.v-total{font-weight:700;font-size:.88rem;color:var(--gold);}
.v-row{display:flex;gap:5px;flex-wrap:wrap;margin-top:2px;}
.v-chip{display:inline-flex;align-items:center;gap:3px;font-size:.67rem;border-radius:4px;padding:1px 6px;white-space:nowrap;border:1px solid;}
.v-chip.unicas{background:rgba(42,255,213,.07);border-color:rgba(42,255,213,.2);color:#2AFFD5;}
.v-chip.sospechosas{background:rgba(255,79,79,.07);border-color:rgba(255,79,79,.2);color:#FF8888;}
.v-none{color:var(--muted);font-size:.78rem;}
.btn-edit{background:rgba(212,168,83,.1);border:1px solid rgba(212,168,83,.3);color:var(--gold);border-radius:6px;padding:4px 10px;font-size:.74rem;cursor:pointer;font-weight:600;transition:all .2s;white-space:nowrap;}
.btn-edit:hover{background:rgba(212,168,83,.25);}
.btn-del{background:rgba(255,79,79,.08);border:1px solid rgba(255,79,79,.25);color:var(--red);border-radius:6px;padding:4px 10px;font-size:.74rem;cursor:pointer;font-weight:600;transition:all .2s;white-space:nowrap;}
.btn-del:hover{background:rgba(255,79,79,.2);}
.act-cell{display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;}
.modal-box{background:var(--card);border:1px solid rgba(212,168,83,.3);border-radius:18px;padding:32px 28px;width:100%;max-width:440px;}
.modal-title{font-size:1.1rem;font-weight:800;margin-bottom:6px;color:var(--gold);}
.modal-sub{font-size:.78rem;color:var(--muted);margin-bottom:22px;}
.modal-field{margin-bottom:14px;}
.modal-field label{display:block;font-size:.74rem;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:1px;}
.modal-field input{width:100%;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:10px;padding:11px 14px;color:var(--text);font-size:.9rem;outline:none;transition:border .2s;}
.modal-field input:focus{border-color:var(--gold);}
.modal-actions{display:flex;gap:10px;margin-top:22px;}
.btn-save{flex:1;background:var(--gold);color:#000;border:none;border-radius:10px;padding:12px;font-size:.9rem;font-weight:700;cursor:pointer;transition:background .2s;}
.btn-save:hover{background:var(--gold-light);}
.btn-save:disabled{opacity:.5;cursor:not-allowed;}
.btn-cancel{flex:1;background:rgba(255,255,255,.04);color:var(--muted);border:1px solid var(--border);border-radius:10px;padding:12px;font-size:.9rem;font-weight:600;cursor:pointer;transition:all .2s;}
.btn-cancel:hover{background:rgba(255,255,255,.08);color:var(--text);}
.modal-msg{font-size:.82rem;margin-top:10px;min-height:16px;}
.modal-msg.err{color:var(--red);}
.modal-msg.ok{color:#4ade80;}
.promo-grid{display:flex;flex-direction:column;gap:10px;}
.promo-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:9px 18px;display:flex;align-items:center;gap:14px;transition:border-color .2s;}
.promo-card:hover{border-color:rgba(212,168,83,.35);}
.promo-card.rank1{border-color:rgba(255,215,0,.4);background:rgba(255,215,0,.04);}
.promo-card.rank2{border-color:rgba(192,192,192,.35);background:rgba(192,192,192,.03);}
.promo-card.rank3{border-color:rgba(205,127,50,.35);background:rgba(205,127,50,.03);}
.rank-num{font-size:1.44rem;min-width:40px;text-align:center;line-height:1;}
.promo-av{width:43px;height:43px;border-radius:50%;object-fit:cover;border:2px solid var(--border);flex-shrink:0;}
.promo-avph{width:43px;height:43px;border-radius:50%;background:var(--dark-2);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:1.17rem;flex-shrink:0;}
.promo-info{flex:1;min-width:0;}
.promo-name{font-weight:700;font-size:1.03rem;color:#fff;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.promo-slug{color:var(--muted);font-size:.78rem;font-family:monospace;}
.promo-right{text-align:right;flex-shrink:0;}
.promo-visits{font-size:1.35rem;font-weight:800;color:var(--gold);line-height:1;}
.promo-label{font-size:.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:2px;}
.promo-ip-row{display:flex;gap:5px;margin-top:5px;flex-wrap:wrap;}
.bar-wrap{height:4px;background:rgba(255,255,255,.06);border-radius:4px;margin-top:8px;overflow:hidden;}
.bar-fill{height:100%;background:var(--gold);border-radius:4px;transition:width .6s ease;}
.promo-copy{display:inline-block;margin-top:6px;}.promo-name-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap;min-width:0;}.promo-ref{color:var(--muted);font-size:.75rem;font-family:monospace;white-space:nowrap;flex-shrink:0;}.promo-copy-inline{display:inline-flex;align-items:center;background:rgba(212,168,83,.1);border:1px solid var(--border);border-radius:6px;padding:2px 8px;font-size:.72rem;color:var(--gold);cursor:pointer;transition:all .2s;white-space:nowrap;flex-shrink:0;}.promo-copy-inline:hover{background:rgba(212,168,83,.22);}
.refresh-btn{background:rgba(212,168,83,.1);border:1px solid var(--border);color:var(--gold);border-radius:8px;padding:6px 14px;font-size:.76rem;cursor:pointer;font-weight:600;transition:all .2s;}
.refresh-btn:hover{background:rgba(212,168,83,.2);}
.promo-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px;}
.promo-title{font-size:.9rem;color:var(--muted);}
.no-visits{text-align:center;padding:48px 20px;color:var(--muted);font-size:.9rem;}
.promo-split{display:flex;gap:20px;align-items:flex-start;}
.promo-col{flex:1;min-width:0;}
.promo-col-title{font-size:.87rem;font-weight:700;color:var(--gold);margin-bottom:6px;padding-bottom:8px;border-bottom:1px solid var(--border);text-align:center;}
.promo-col-sub{font-size:.78rem;color:var(--muted);margin-bottom:12px;text-align:center;}
@media(max-width:720px){.promo-split{flex-direction:column;}}
.at-summary{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px;}
.at-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 18px;flex:1;min-width:120px;}
.at-val{font-size:1.6rem;font-weight:800;color:var(--gold);line-height:1;}
.at-lbl{font-size:.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:4px;}
.at-card.red .at-val{color:#FF8888;}
.at-card.teal .at-val{color:#2AFFD5;}
.at-card.green .at-val{color:#4ade80;}
</style>
</head>
<body>
<div id="loginWrap">
  <div class="login-box">
    <div class="brand">Innova<span>IA</span></div>
    <div class="brand-sub">Panel de Asesores</div>
    <input type="password" id="pwInput" placeholder="Contrasena de acceso"/>
    <button class="btn-gold" id="loginBtn">Entrar al panel</button>
    <div class="err" id="loginErr"></div>
  </div>
</div>
<div id="dashboard">
  <div class="topbar">
    <div class="topbrand">Innova<span>IA</span> &mdash; Asesores</div>
    <div class="badges">
      <span class="badge badge-green" id="badgeTotal">&mdash;</span>
      <span class="badge badge-gold" id="badgeLast">&mdash;</span>
      <button class="btn-out" id="btnOut">Cerrar sesion</button>
    </div>
  </div>
  <div class="tab-bar">
    <button class="tab-btn active" id="tabBtnAsesores" onclick="switchTab('asesores')">Asesores</button>
    <button class="tab-btn" id="tabBtnPromo" onclick="switchTab('promo')">Top Promotores</button>
    <button class="tab-btn" id="tabBtnAnti" onclick="switchTab('anti')">Anti-trampa</button>
  </div>
  <div id="panelAsesores">
    <div class="search-row">
      <input type="text" id="searchQ" placeholder="Buscar por nombre, codigo o telefono..."/>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr><th>#</th><th>Foto</th><th>Nombre / Rol</th><th>Codigo</th><th>Telefono</th><th>Visitas</th><th>Conv.</th><th>Tasa</th><th>Registrado</th><th>Link</th><th>Acciones</th></tr>
        </thead>
        <tbody id="tBody"><tr><td colspan="11" style="text-align:center;padding:48px;color:var(--muted);">Cargando...</td></tr></tbody>
      </table>
    </div>
  </div>
      <div id="panelPromo" style="display:none">
      <div class="promo-header">
        <button class="refresh-btn" onclick="loadPromo()">↺ Actualizar</button>
      </div>
      <div class="promo-split">
        <div class="promo-col">
          <div class="promo-col-title">🏆 Top Promotores</div>
          <div class="promo-col-sub" id="promoSubtitle">Cargando...</div>
          <div class="promo-grid" id="promoGrid"><div class="no-visits">Cargando...</div></div>
        </div>
        <div class="promo-col">
          <div class="promo-col-title">☀️ Top Hoy</div>
          <div class="promo-col-sub" id="hoySubtitle">Cargando...</div>
          <div class="promo-grid" id="hoyGrid"><div class="no-visits">Cargando...</div></div>
        </div>
      </div>
    </div>
  <div id="panelAnti" style="display:none">
    <div class="promo-header">
      <span class="promo-title">Deteccion de IPs sospechosas por asesor</span>
      <button class="refresh-btn" onclick="loadAnti()">Actualizar</button>
    </div>
    <div class="at-summary" id="antiSummary"></div>
    <div class="promo-grid" id="antiGrid"><div class="no-visits">Cargando...</div></div>
  </div>
</div>
<div id="editModal" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeEdit()">
  <div class="modal-box">
    <div class="modal-title">Editar Asesor</div>
    <div class="modal-sub" id="editModalSub">Codigo: &mdash;</div>
    <div class="modal-field"><label>Nombre completo</label><input type="text" id="editNombre" placeholder="Nombre del asesor"/></div>
    <div class="modal-field"><label>Rol / Descripcion</label><input type="text" id="editRol" placeholder="Ej: Asesor InnovaIA"/></div>
    <div class="modal-field"><label>WhatsApp / Telefono</label><input type="text" id="editTel" placeholder="Ej: 573001234567"/></div>
    <div class="modal-field"><label>Foto (ruta)</label><input type="text" id="editFoto" placeholder="Ej: fotos/legend.jpg"/></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeEdit()">Cancelar</button>
      <button class="btn-save" id="btnSaveEdit" onclick="saveEdit()">Guardar cambios</button>
    </div>
    <div class="modal-msg" id="editMsg"></div>
  </div>
</div>
<script>
var SECRET='Genesis22';
var allData=[],statsData={},currentTab='asesores',editingSlug=null;
document.getElementById('loginBtn').addEventListener('click',doLogin);
document.getElementById('pwInput').addEventListener('keydown',function(e){if(e.key==='Enter')doLogin();});
document.getElementById('btnOut').addEventListener('click',doLogout);
document.getElementById('searchQ').addEventListener('input',render);
function doLogin(){
  var pw=document.getElementById('pwInput').value.trim();
  if(pw!==SECRET){document.getElementById('loginErr').textContent='Contrasena incorrecta.';return;}
  document.getElementById('loginWrap').style.display='none';
  document.getElementById('dashboard').style.display='block';
  loadData();
}
function doLogout(){
  allData=[];statsData={};editingSlug=null;
  document.getElementById('loginWrap').style.display='flex';
  document.getElementById('dashboard').style.display='none';
  document.getElementById('pwInput').value='';document.getElementById('loginErr').textContent='';
}
var _promoTimer=null;
function switchTab(tab){
  currentTab=tab;
  document.getElementById('tabBtnAsesores').classList.toggle('active',tab==='asesores');
  document.getElementById('tabBtnPromo').classList.toggle('active',tab==='promo');
  document.getElementById('tabBtnAnti').classList.toggle('active',tab==='anti');
  document.getElementById('panelAsesores').style.display=tab==='asesores'?'block':'none';
  document.getElementById('panelPromo').style.display=tab==='promo'?'block':'none';
  document.getElementById('panelAnti').style.display=tab==='anti'?'block':'none';
  if(tab==='promo'){loadPromo();if(!_promoTimer)_promoTimer=setInterval(loadPromo,30000);}
  else{if(_promoTimer){clearInterval(_promoTimer);_promoTimer=null;}}
  if(tab==='anti')loadAnti();
}
function phoneFlag(t){if(!t)return'';t=String(t).replace(/[\s\-\(\)\.]/g,'').replace(/^\+/,'');var m=[['593','ec'],['591','bo'],['595','py'],['598','uy'],['503','sv'],['502','gt'],['504','hn'],['505','ni'],['506','cr'],['507','pa'],['509','ht'],['57','co'],['58','ve'],['51','pe'],['54','ar'],['55','br'],['56','cl'],['52','mx'],['53','cu'],['1','us'],['44','gb'],['34','es'],['49','de'],['33','fr'],['39','it'],['61','au'],['81','jp'],['86','cn'],['91','in'],['20','eg'],['212','ma'],['234','ng']];for(var i=0;i<m.length;i++){if(t.startsWith(m[i][0]))return'<img src="https://flagcdn.com/w20/'+m[i][1]+'.png" style="width:18px;height:13px;border-radius:2px;vertical-align:middle;margin-left:3px;" />';}return'';}
function parseEntry(entry){
  if(!entry)return{total:0,uniq:0,suspicious:0,conversions:0,legacy:true};
  if(typeof entry==='number')return{total:entry,uniq:0,suspicious:0,conversions:0,legacy:true};
  var total=entry.total||0;
  var ips=entry.ips||{};
  var vals=Object.values(ips);
  var uniq=Object.keys(ips).length;
  var suspicious=vals.filter(function(c){return c>1;}).length;
  return{total:total,uniq:uniq,suspicious:suspicious,conversions:entry.conversions||0,legacy:false};
}
async function loadData(){
  document.getElementById('tBody').innerHTML='<tr><td colspan="9" style="text-align:center;padding:48px;color:var(--muted);">Cargando...</td></tr>';
  try{
    var [r,s]=await Promise.all([fetch('/api/asesores?_t='+Date.now()),fetch('/api/stats?_t='+Date.now())]);
    var raw=await r.json(); statsData=await s.json();
    allData=Object.entries(raw).filter(function(e){return e[0]!=='default';})
      .map(function(e){return Object.assign({slug:e[0]},e[1]);})
      .sort(function(a,b){return new Date(b.registrado||0)-new Date(a.registrado||0);});
    render();
  }catch(ex){document.getElementById('tBody').innerHTML='<tr><td colspan="11" style="text-align:center;padding:48px;color:var(--muted);">Error: '+ex.message+'</td></tr>';}
}
async function loadPromo(){
  document.getElementById('promoGrid').innerHTML='<div class="no-visits">Cargando...</div>';
  document.getElementById('hoyGrid').innerHTML='<div class="no-visits">Cargando...</div>';
  document.getElementById('promoSubtitle').textContent='Cargando...';
  document.getElementById('hoySubtitle').textContent='Cargando...';
  try{
    var [statsRes,asesRes]=await Promise.all([
      fetch('/api/stats?_t='+Date.now()),
      allData.length?Promise.resolve(null):fetch('/api/asesores?_t='+Date.now())
    ]);
    statsData=await statsRes.json();
    if(asesRes){
      var raw=await asesRes.json();
      allData=Object.entries(raw)
        .filter(function(e){return e[0]!=='default';})
        .map(function(e){return Object.assign({slug:e[0]},e[1]);})
        .sort(function(a,b){return new Date(b.registrado||0)-new Date(a.registrado||0);});
      render();
    }
    renderPromo();
    renderHoy();
  }catch(ex){
    document.getElementById('promoGrid').innerHTML='<div class="no-visits">Error: '+ex.message+'</div>';
    document.getElementById('hoyGrid').innerHTML='<div class="no-visits">Error: '+ex.message+'</div>';
  }
}
function renderHoy(){
  var today=new Date(Date.now()-18000000).toISOString().split('T')[0];
  var entries=Object.entries(statsData).map(function(e){
    var ref=e[0],p=e[1];
    var asesor=allData.find(function(a){return a.slug===ref;})||null;
    var hoy=(p&&typeof p==='object'&&p.days)?(p.days[today]||0):0;
    var adj=Math.max(0,hoy-(p.suspicious||0)*2);
    var tasa=adj>0&&p.conversions?(Math.round((p.conversions/adj)*100))+'%':'—';
    return {ref:ref,p:p,hoy:hoy,adj:adj,tasa:tasa,asesor:asesor};
  }).filter(function(e){return e.hoy>0;}).sort(function(a,b){return b.adj-a.adj;}).slice(0,20);
  var totalHoy=entries.reduce(function(s,e){return s+e.hoy;},0);
  document.getElementById('hoySubtitle').textContent=
    entries.length+' promotor'+(entries.length!==1?'es':'')+' hoy · '+totalHoy.toLocaleString('es-CO')+' visitas';
  if(!entries.length){
    document.getElementById('hoyGrid').innerHTML='<div class="no-visits">Aún no hay visitas hoy.<br>Actualiza en unos minutos.</div>';
    return;
  }
  var maxV=entries[0].adj||1;
  var ri=['🥇','🥈','🥉'];
  var html='';
  entries.forEach(function(entry,i){

async function loadAnti(){

function openEdit(slug){
  var d=allData.find(function(a){return a.slug===slug;});if(!d)return;
  editingSlug=slug;
  document.getElementById('editModalSub').textContent='Codigo: '+slug;
  document.getElementById('editNombre').value=d.nombre||'';
  document.getElementById('editRol').value=d.rol||'';
  document.getElementById('editTel').value=d.telefono||d.whatsapp||'';
  document.getElementById('editFoto').value=d.foto||'';
  document.getElementById('editMsg').textContent='';document.getElementById('editMsg').className='modal-msg';
  document.getElementById('editModal').style.display='flex';
}
function closeEdit(){document.getElementById('editModal').style.display='none';editingSlug=null;}
async function saveEdit(){
  if(!editingSlug)return;
  var nombre=document.getElementById('editNombre').value.trim();
  var rol=document.getElementById('editRol').value.trim();
  var telefono=document.getElementById('editTel').value.trim();
  var foto=document.getElementById('editFoto').value.trim();
  var btn=document.getElementById('btnSaveEdit'),msg=document.getElementById('editMsg');
  btn.disabled=true;btn.textContent='Guardando...';msg.textContent='';msg.className='modal-msg';
  try{
    var res=await fetch('/api/edit-asesor',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({slug:editingSlug,nombre:nombre,rol:rol,telefono:telefono,foto:foto})});
    var data=await res.json();
    if(data.ok){var d=allData.find(function(a){return a.slug===editingSlug;});if(d){if(nombre)d.nombre=nombre;if(rol)d.rol=rol;if(telefono){d.telefono=telefono;d.whatsapp=telefono;}if(foto)d.foto=foto;}msg.textContent='Guardado correctamente';msg.className='modal-msg ok';setTimeout(function(){closeEdit();render();},800);}
    else{msg.textContent='Error: '+(data.error||'intenta de nuevo');msg.className='modal-msg err';}
  }catch(ex){msg.textContent='Error de red: '+ex.message;msg.className='modal-msg err';}
  finally{btn.disabled=false;btn.textContent='Guardar cambios';}
}
async function deleteAsesor(slug,nombre){
  if(!confirm('Eliminar "'+slug+'"?\nNo se puede deshacer.'))return;
  try{
    var res=await fetch('/api/delete-asesor',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({slug:slug})});
    var data=await res.json();
    if(data.ok){allData=allData.filter(function(a){return a.slug!==slug;});render();}
    else alert('Error: '+(data.error||'intenta de nuevo'));
  }catch(ex){alert('Error de red: '+ex.message);}
}
function copyPill(el){var lk=el.getAttribute('data-link'),og=el.getAttribute('data-orig');navigator.clipboard.writeText(lk).then(function(){el.textContent='Copiado';setTimeout(function(){el.textContent=og;},2000);});}
function sanitize(s){var str=String(s||'');var bad=(str.match(/[ÃÂ]/g)||[]).length;if(bad>8)return '<span style="color:var(--muted);font-style:italic">entrada antigua</span>';return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmtDate(iso){if(!iso)return '--';try{return new Date(iso).toLocaleString('es-CO',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit',timeZone:'America/Bogota'});}catch(e){return iso;}}
