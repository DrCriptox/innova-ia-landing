<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>InnovaIA — Panel Asesores</title>
<style>
:root{--gold:#D4A853;--gold-light:#F0C97A;--dark:#060810;--dark-2:#0C0F1A;--card:#0E1219;--text:#EAECF4;--muted:#7A8099;--green:#25D366;--border:rgba(212,168,83,0.15);--red:#FF4F4F;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--dark);color:var(--text);font-family:'Segoe UI',sans-serif;min-height:100vh;}
#loginWrap{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;}
.login-box{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:44px 36px;width:100%;max-width:400px;text-align:center;}
.brand{font-size:2rem;font-weight:800;letter-spacing:-1px;margin-bottom:4px;}
.brand span{color:var(--gold);}
.brand-sub{color:var(--muted);font-size:.78rem;letter-spacing:3px;text-transform:uppercase;margin-bottom:32px;}
input[type=password]{width:100%;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:10px;padding:14px 16px;color:var(--text);font-size:.95rem;outline:none;margin-bottom:14px;transition:border .2s;}
input[type=password]:focus{border-color:var(--gold);}
input[type=text]{width:100%;max-width:380px;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:10px;padding:11px 16px;color:var(--text);font-size:.9rem;outline:none;transition:border .2s;}
input[type=text]:focus{border-color:var(--gold);}
.btn-gold{width:100%;background:var(--gold);color:#000;border:none;border-radius:10px;padding:14px;font-size:1rem;font-weight:700;cursor:pointer;transition:background .2s;}
.btn-gold:hover{background:var(--gold-light);}
.err{color:var(--red);font-size:.83rem;margin-top:10px;min-height:18px;}
#dashboard{display:none;padding:24px 20px 60px;}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;flex-wrap:wrap;gap:10px;}
.topbrand{font-size:1.25rem;font-weight:800;}
.topbrand span{color:var(--gold);}
.badges{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.badge{border-radius:100px;padding:5px 14px;font-size:.76rem;font-weight:600;border:1px solid;}
.badge-green{background:rgba(37,211,102,.08);border-color:rgba(37,211,102,.25);color:#4ade80;}
.badge-gold{background:rgba(212,168,83,.1);border-color:var(--border);color:var(--gold);}
.btn-out{background:rgba(255,79,79,.1);border:1px solid rgba(255,79,79,.3);color:var(--red);border-radius:8px;padding:6px 14px;font-size:.76rem;cursor:pointer;font-weight:600;}

/* TABS */
.tab-bar{display:flex;gap:6px;margin-bottom:18px;border-bottom:1px solid var(--border);padding-bottom:0;}
.tab-btn{background:none;border:none;color:var(--muted);font-size:.88rem;font-weight:600;padding:10px 20px;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .2s;border-radius:8px 8px 0 0;}
.tab-btn:hover{color:var(--text);background:rgba(255,255,255,.04);}
.tab-btn.active{color:var(--gold);border-bottom-color:var(--gold);background:rgba(212,168,83,.05);}

/* TOP PROMOTORES */
.promo-grid{display:flex;flex-direction:column;gap:10px;}
.promo-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px 20px;display:flex;align-items:center;gap:16px;transition:border-color .2s;}
.promo-card:hover{border-color:rgba(212,168,83,.35);}
.promo-card.rank1{border-color:rgba(255,215,0,.4);background:rgba(255,215,0,.04);}
.promo-card.rank2{border-color:rgba(192,192,192,.35);background:rgba(192,192,192,.03);}
.promo-card.rank3{border-color:rgba(205,127,50,.35);background:rgba(205,127,50,.03);}
.rank-num{font-size:1.6rem;min-width:40px;text-align:center;line-height:1;}
.promo-av{width:48px;height:48px;border-radius:50%;object-fit:cover;border:2px solid var(--border);flex-shrink:0;}
.promo-avph{width:48px;height:48px;border-radius:50%;background:var(--dark-2);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:1.3rem;flex-shrink:0;}
.promo-info{flex:1;min-width:0;}
.promo-name{font-weight:700;font-size:.95rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.promo-slug{color:var(--muted);font-size:.78rem;font-family:monospace;}
.promo-right{text-align:right;flex-shrink:0;}
.promo-visits{font-size:1.5rem;font-weight:800;color:var(--gold);line-height:1;}
.promo-label{font-size:.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:2px;}
.bar-wrap{height:4px;background:rgba(255,255,255,.06);border-radius:4px;margin-top:8px;overflow:hidden;}
.bar-fill{height:100%;background:var(--gold);border-radius:4px;transition:width .6s ease;}
.promo-copy{display:inline-block;margin-top:6px;}
.refresh-btn{background:rgba(212,168,83,.1);border:1px solid var(--border);color:var(--gold);border-radius:8px;padding:6px 14px;font-size:.76rem;cursor:pointer;font-weight:600;transition:all .2s;}
.refresh-btn:hover{background:rgba(212,168,83,.2);}
.promo-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px;}
.promo-title{font-size:.9rem;color:var(--muted);}
.no-visits{text-align:center;padding:48px 20px;color:var(--muted);font-size:.9rem;}
.search-row{margin-bottom:16px;}
.table-wrap{border-radius:14px;border:1px solid var(--border);overflow:hidden;}
table{width:100%;border-collapse:collapse;}
thead{background:rgba(212,168,83,.06);}
th{padding:12px 14px;text-align:left;font-size:.7rem;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);font-weight:600;border-bottom:1px solid var(--border);white-space:nowrap;}
td{padding:12px 14px;font-size:.87rem;border-bottom:1px solid rgba(255,255,255,.04);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(255,255,255,.02);}
.av{width:40px;height:40px;border-radius:50%;object-fit:cover;border:2px solid var(--border);}
.avph{width:40px;height:40px;border-radius:50%;background:var(--dark-2,#111);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:1.1rem;}
.nm{font-weight:600;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.rl{color:var(--muted);font-size:.78rem;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.pill{display:inline-block;background:rgba(212,168,83,.1);border:1px solid var(--border);border-radius:6px;padding:3px 10px;font-size:.76rem;color:var(--gold);font-family:monospace;cursor:pointer;transition:all .2s;white-space:nowrap;}
.pill:hover{background:rgba(212,168,83,.22);}
.wa{color:#4ade80;text-decoration:none;font-size:.84rem;}
.wa:hover{text-decoration:underline;}
.dt{color:var(--muted);font-size:.78rem;white-space:nowrap;}
.empty{text-align:center;padding:48px;color:var(--muted);}
</style>
</head>
<body>

<div id="loginWrap">
  <div class="login-box">
    <div class="brand">Innova<span>IA</span></div>
    <div class="brand-sub">Panel de Asesores</div>
    <input type="password" id="pwInput" placeholder="Contraseña de acceso"/>
    <button class="btn-gold" id="loginBtn">Entrar al panel</button>
    <div class="err" id="loginErr"></div>
  </div>
</div>

<div id="dashboard">
  <div class="topbar">
    <div class="topbrand">Innova<span>IA</span> — Asesores</div>
    <div class="badges">
      <span class="badge badge-green" id="badgeTotal">—</span>
      <span class="badge badge-gold" id="badgeLast">—</span>
      <button class="btn-out" id="btnOut">Cerrar sesión</button>
    </div>
  </div>
  <!-- TABS -->
  <div class="tab-bar">
    <button class="tab-btn active" id="tabBtnAsesores" onclick="switchTab('asesores')">&#x1F465; Asesores</button>
    <button class="tab-btn" id="tabBtnPromo" onclick="switchTab('promo')">&#x1F3C6; Top Promotores</button>
  </div>

  <!-- Panel: Asesores -->
  <div id="panelAsesores">
    <div class="search-row">
      <input type="text" id="searchQ" placeholder="Buscar por nombre, código o teléfono..."/>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>#</th><th>Foto</th><th>Nombre / Rol</th><th>Código</th>
            <th>Teléfono</th><th>Registrado</th><th>Link</th>
          </tr>
        </thead>
        <tbody id="tBody"><tr><td colspan="7" class="empty">Cargando...</td></tr></tbody>
      </table>
    </div>
  </div>

  <!-- Panel: Top Promotores -->
  <div id="panelPromo" style="display:none">
    <div class="promo-header">
      <span class="promo-title" id="promoSubtitle">Cargando estadísticas...</span>
      <button class="refresh-btn" onclick="loadPromo()">&#x21BA; Actualizar</button>
    </div>
    <div class="promo-grid" id="promoGrid">
      <div class="no-visits">Cargando...</div>
    </div>
  </div>
</div></div>

<script>
var SECRET='Genesis22';
var allData=[];
var statsData={};
var currentTab='asesores';

document.getElementById('loginBtn').addEventListener('click',doLogin);
document.getElementById('pwInput').addEventListener('keydown',function(e){if(e.key==='Enter')doLogin();});
document.getElementById('btnOut').addEventListener('click',doLogout);
document.getElementById('searchQ').addEventListener('input',render);

function doLogin(){
  var pw=document.getElementById('pwInput').value.trim();
  if(pw!==SECRET){document.getElementById('loginErr').textContent='Contraseña incorrecta.';return;}
  document.getElementById('loginWrap').style.display='none';
  document.getElementById('dashboard').style.display='block';
  loadData();
}

function doLogout(){
  allData=[];statsData={};
  document.getElementById('loginWrap').style.display='flex';
  document.getElementById('dashboard').style.display='none';
  document.getElementById('pwInput').value='';
  document.getElementById('loginErr').textContent='';
}

function switchTab(tab){
  currentTab=tab;
  document.getElementById('tabBtnAsesores').classList.toggle('active',tab==='asesores');
  document.getElementById('tabBtnPromo').classList.toggle('active',tab==='promo');
  document.getElementById('panelAsesores').style.display=tab==='asesores'?'block':'none';
  document.getElementById('panelPromo').style.display=tab==='promo'?'block':'none';
  if(tab==='promo')loadPromo();
}

async function loadData(){
  document.getElementById('tBody').innerHTML='<tr><td colspan="7" class="empty">Cargando datos en vivo...</td></tr>';
  try{
    var res=await fetch('/api/asesores?_t='+Date.now());
    var raw=await res.json();
    allData=Object.entries(raw)
      .filter(function(e){return e[0]!=='default';})
      .map(function(e){var o=Object.assign({slug:e[0]},e[1]);return o;})
      .sort(function(a,b){return new Date(b.registrado||0)-new Date(a.registrado||0);});
    render();
  }catch(ex){
    document.getElementById('tBody').innerHTML='<tr><td colspan="7" class="empty">Error: '+ex.message+'</td></tr>';
  }
}

async function loadPromo(){
  document.getElementById('promoGrid').innerHTML='<div class="no-visits">Cargando estadísticas...</div>';
  document.getElementById('promoSubtitle').textContent='Cargando estadísticas...';
  try{
    var [statsRes,asesRes]=await Promise.all([
      fetch('/api/stats?_t='+Date.now()),
      allData.length?Promise.resolve(null):fetch('/api/asesores?_t='+Date.now())
    ]);
    statsData=await statsRes.json();
    if(asesRes){
      var raw=await asesRes.json();
      allData=Object.entries(raw)
        .filter(function(e){return e[0]!=='default';})
        .map(function(e){return Object.assign({slug:e[0]},e[1]);})
        .sort(function(a,b){return new Date(b.registrado||0)-new Date(a.registrado||0);});
      render();
    }
    renderPromo();
  }catch(ex){
    document.getElementById('promoGrid').innerHTML='<div class="no-visits">Error: '+ex.message+'</div>';
  }
}

function renderPromo(){
  var entries=Object.entries(statsData).map(function(e){
    var ref=e[0],visits=e[1];
    var asesor=allData.find(function(a){return a.slug===ref;})||null;
    return {ref:ref,visits:visits,asesor:asesor};
  }).sort(function(a,b){return b.visits-a.visits;});
  var totalVisits=entries.reduce(function(s,e){return s+e.visits;},0);
  var totalRefs=entries.length;
  document.getElementById('promoSubtitle').textContent=
    totalRefs+' promotor'+(totalRefs!==1?'es':'')+' · '+totalVisits.toLocaleString('es-CO')+' visitas totales';
  if(!entries.length){
    document.getElementById('promoGrid').innerHTML='<div class="no-visits">Aún no hay visitas registradas.<br>Las visitas se cuentan cuando alguien entra por un link ?ref=código.</div>';
    return;
  }
  var maxVisits=entries[0].visits||1;
  var medals=['🥇','🥈','🥉'];
  var html='';
  entries.forEach(function(entry,i){
    var rank=i+1;
    var rankClass=rank<=3?'rank'+rank:'';
    var rankDisplay=rank<=3?medals[i]:rank;
    var visits=entry.visits;
    var pct=Math.round((visits/maxVisits)*100);
    var ref=entry.ref;
    var link='https://www.innovaia.app/?ref='+encodeURIComponent(ref);
    var nombre='—';
    if(entry.asesor){nombre=sanitize(entry.asesor.nombre||ref);}
    else{nombre='<span style="color:var(--muted);font-style:italic">'+ref+'</span> (no registrado)';}
    html+='<div class="promo-card '+rankClass+'">';
    html+='<div class="rank-num">'+rankDisplay+'</div>';
    html+='<div id="pav'+i+'"><div class="promo-avph">👤</div></div>';
    html+='<div class="promo-info">';
    html+='<div class="promo-name">'+nombre+'</div>';
    html+='<div class="promo-slug">?ref='+ref+'</div>';
    html+='<div class="bar-wrap"><div class="bar-fill" style="width:'+pct+'%"></div></div>';
    html+='<span class="pill promo-copy" data-link="'+link+'" data-orig="📋 Copiar link" onclick="copyPill(this)">📋 Copiar link</span>';
    html+='</div>';
    html+='<div class="promo-right">';
    html+='<div class="promo-visits">'+visits.toLocaleString('es-CO')+'</div>';
    html+='<div class="promo-label">visitas</div>';
    html+='</div>';
    html+='</div>';
  });
  document.getElementById('promoGrid').innerHTML=html;
  entries.forEach(function(entry,i){
    if(!entry.asesor)return;
    var f=entry.asesor.foto||'';
    if(!f)return;
    var src=f.indexOf('fotos/')===0?'/'+f:f;
    var img=new Image();
    img.className='promo-av';
    img.alt=entry.asesor.nombre||'';
    img.src=src;
    img.onerror=function(){this.parentNode.innerHTML='<div class="promo-avph">👤</div>';};
    var el=document.getElementById('pav'+i);
    if(el){el.innerHTML='';el.appendChild(img);}
  });
}

function render(){
  var q=(document.getElementById('searchQ').value||'').toLowerCase();
  var rows=q?allData.filter(function(d){
    return (d.nombre||'').toLowerCase().indexOf(q)>=0||
           (d.slug||'').toLowerCase().indexOf(q)>=0||
           (d.telefono||d.whatsapp||'').indexOf(q)>=0;
  }):allData;

  document.getElementById('badgeTotal').textContent=allData.length+' registrado'+(allData.length===1?'':'s');
  if(allData.length>0){
    document.getElementById('badgeLast').textContent='Último: '+(allData[0].nombre||allData[0].slug||'—').substring(0,20);
  }

  if(!rows.length){
    document.getElementById('tBody').innerHTML='<tr><td colspan="7" class="empty">Sin resultados.</td></tr>';
    return;
  }

  var html='';
  rows.forEach(function(d,i){
    var num=allData.indexOf(d)+1;
    var slug=d.slug||'';
    var nombre=sanitize(d.nombre||'—');
    var rol=sanitize(d.rol||'Asesor InnovaIA');
    var tel=d.telefono||d.whatsapp||'—';
    var waNum=tel.replace(/[^0-9]/g,'');
    var fecha=fmtDate(d.registrado);
    var link='https://www.innovaia.app/?ref='+encodeURIComponent(slug);
    var foto=d.foto?(d.foto.indexOf('fotos/')===0?'/'+d.foto:d.foto):'';

    html+='<tr>';
    html+='<td style="color:var(--muted);font-size:.78rem;">'+num+'</td>';
    html+='<td><div id="av'+i+'">'+avHtml(foto,nombre,i)+'</div></td>';
    html+='<td><div class="nm" title="'+nombre+'">'+nombre+'</div><div class="rl">'+rol+'</div></td>';
    html+='<td><span class="pill" data-link="'+link+'" data-orig="'+slug+'" onclick="copyPill(this)">'+sanitize(slug)+'</span></td>';
    html+='<td><a class="wa" href="https://wa.me/'+waNum+'" target="_blank">'+sanitize(tel)+'</a></td>';
    html+='<td class="dt">'+fecha+'</td>';
    html+='<td><span class="pill" data-link="'+link+'" data-orig="📋 Copiar" onclick="copyPill(this)">📋 Copiar</span></td>';
    html+='</tr>';
  });
  document.getElementById('tBody').innerHTML=html;

  // Set avatar imgs after insertion to avoid escaping issues
  rows.forEach(function(d,i){
    if(d.foto){
      var foto=d.foto.indexOf('fotos/')===0?'/'+d.foto:d.foto;
      var img=new Image();
      img.className='av';
      img.alt=d.nombre||'';
      img.src=foto;
      img.onerror=function(){this.parentNode.innerHTML='<div class="avph">👤</div>';};
      document.getElementById('av'+i).innerHTML='';
      document.getElementById('av'+i).appendChild(img);
    }
  });
}

function copyPill(el){
  var link=el.getAttribute('data-link');
  var orig=el.getAttribute('data-orig');
  navigator.clipboard.writeText(link).then(function(){
    el.textContent='✅ Copiado';
    setTimeout(function(){el.textContent=orig;},2000);
  });
}

function avHtml(foto,nombre,i){
  if(!foto)return '<div class="avph">👤</div>';
  return '<div class="avph">👤</div>';// will be replaced by JS
}

function sanitize(s){
  // If string is mostly corrupted (high ratio of replacement chars), show placeholder
  var str=String(s||'');
  var bad=(str.match(/[ÃÂ]/g)||[]).length;
  if(bad>8)return '<span style="color:var(--muted);font-style:italic">entrada antigua</span>';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function fmtDate(iso){
  if(!iso)return '—';
  try{
    return new Date(iso).toLocaleString('es-CO',{
      day:'2-digit',month:'short',year:'numeric',
      hour:'2-digit',minute:'2-digit',timeZone:'America/Bogota'
    });
  }catch(e){return iso;}
}
</script>
</body>
</html>
