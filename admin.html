<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>InnovaIA — Panel Asesores</title>
<style>
:root{--gold:#D4A853;--gold-light:#F0C97A;--dark:#060810;--dark-2:#0C0F1A;--dark-card:#0E1219;--text:#EAECF4;--muted:#7A8099;--green:#25D366;--border:rgba(212,168,83,0.15);--red:#FF4F4F;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--dark);color:var(--text);font-family:'Segoe UI',sans-serif;min-height:100vh;}
/* LOGIN */
#loginWrap{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;}
.login-box{background:var(--dark-card);border:1px solid var(--border);border-radius:18px;padding:44px 36px;width:100%;max-width:400px;text-align:center;}
.login-logo{font-size:2rem;font-weight:800;letter-spacing:-1px;margin-bottom:4px;}
.login-logo span{color:var(--gold);}
.login-sub{color:var(--muted);font-size:.82rem;margin-bottom:32px;letter-spacing:2px;text-transform:uppercase;}
.login-box input{width:100%;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:10px;padding:14px 16px;color:var(--text);font-size:.95rem;outline:none;margin-bottom:14px;transition:border .2s;}
.login-box input:focus{border-color:var(--gold);}
.login-btn{width:100%;background:var(--gold);color:#000;border:none;border-radius:10px;padding:14px;font-size:1rem;font-weight:700;cursor:pointer;transition:background .2s;}
.login-btn:hover{background:var(--gold-light);}
.login-err{color:var(--red);font-size:.83rem;margin-top:10px;min-height:20px;}
/* DASHBOARD */
#dashboard{display:none;padding:28px 24px 60px;}
.top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;flex-wrap:wrap;gap:12px;}
.top-logo{font-size:1.3rem;font-weight:800;letter-spacing:-.5px;}
.top-logo span{color:var(--gold);}
.top-meta{display:flex;gap:10px;align-items:center;}
.badge{background:rgba(212,168,83,.12);border:1px solid var(--border);border-radius:100px;padding:6px 14px;font-size:.78rem;color:var(--gold);font-weight:600;}
.badge-green{background:rgba(37,211,102,.08);border-color:rgba(37,211,102,.2);color:#4ade80;}
.logout-btn{background:rgba(255,79,79,.1);border:1px solid rgba(255,79,79,.25);color:var(--red);border-radius:8px;padding:7px 14px;font-size:.78rem;cursor:pointer;font-weight:600;}
/* SEARCH */
.search-wrap{margin-bottom:20px;}
.search-wrap input{width:100%;max-width:380px;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:10px;padding:11px 16px;color:var(--text);font-size:.9rem;outline:none;transition:border .2s;}
.search-wrap input:focus{border-color:var(--gold);}
/* TABLE */
.table-wrap{overflow-x:auto;border-radius:14px;border:1px solid var(--border);}
table{width:100%;border-collapse:collapse;min-width:700px;}
thead{background:rgba(212,168,83,.07);}
th{padding:13px 16px;text-align:left;font-size:.75rem;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);font-weight:600;border-bottom:1px solid var(--border);}
td{padding:13px 16px;font-size:.88rem;border-bottom:1px solid rgba(255,255,255,.04);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(255,255,255,.02);}
.avatar{width:40px;height:40px;border-radius:50%;object-fit:cover;border:2px solid var(--border);background:var(--dark-2);}
.avatar-ph{width:40px;height:40px;border-radius:50%;background:var(--dark-2);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:1.2rem;}
.name-cell{font-weight:600;color:var(--text);}
.rol-cell{color:var(--muted);font-size:.8rem;}
.slug-pill{background:rgba(212,168,83,.1);border:1px solid var(--border);border-radius:6px;padding:3px 10px;font-size:.78rem;color:var(--gold);font-family:monospace;cursor:pointer;transition:background .2s;white-space:nowrap;}
.slug-pill:hover{background:rgba(212,168,83,.22);}
.wa-link{color:var(--green);text-decoration:none;font-size:.85rem;}
.wa-link:hover{text-decoration:underline;}
.date-cell{color:var(--muted);font-size:.8rem;white-space:nowrap;}
.copy-hint{font-size:.7rem;color:var(--gold);margin-top:3px;opacity:0;transition:opacity .3s;}
.copy-hint.show{opacity:1;}
.no-data{text-align:center;padding:48px;color:var(--muted);}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginWrap">
  <div class="login-box">
    <div class="login-logo">Innova<span>IA</span></div>
    <div class="login-sub">Panel de Asesores</div>
    <input type="password" id="pwInput" placeholder="Contraseña de acceso" onkeydown="if(event.key==='Enter')doLogin()"/>
    <button class="login-btn" onclick="doLogin()">Entrar al panel</button>
    <div class="login-err" id="loginErr"></div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
  <div class="top-bar">
    <div class="top-logo">Innova<span>IA</span> — Asesores</div>
    <div class="top-meta">
      <span class="badge badge-green" id="totalBadge">0 registrados</span>
      <span class="badge" id="lastBadge">—</span>
      <button class="logout-btn" onclick="logout()">Cerrar sesión</button>
    </div>
  </div>
  <div class="search-wrap">
    <input type="text" id="searchInput" placeholder="Buscar por nombre, slug o teléfono..." oninput="renderTable()"/>
  </div>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Foto</th>
          <th>Nombre / Rol</th>
          <th>Código (slug)</th>
          <th>Teléfono</th>
          <th>Fecha de registro</th>
          <th>Link</th>
        </tr>
      </thead>
      <tbody id="tableBody">
        <tr><td colspan="7" class="no-data">Cargando...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script>
const ADMIN_SECRET = 'c0add8425ca871a3d417f57e8db1b2150fb9cdf0de5f41e51394511b9d219a4b';
let _data = [];
let _authed = false;

function doLogin(){
  const pw = document.getElementById('pwInput').value.trim();
  if(pw !== ADMIN_SECRET){ document.getElementById('loginErr').textContent='Contraseña incorrecta.'; return; }
  _authed = true;
  document.getElementById('loginWrap').style.display='none';
  document.getElementById('dashboard').style.display='block';
  loadData();
}

function logout(){
  _authed=false;
  _data=[];
  document.getElementById('loginWrap').style.display='flex';
  document.getElementById('dashboard').style.display='none';
  document.getElementById('pwInput').value='';
  document.getElementById('loginErr').textContent='';
}

async function loadData(){
  document.getElementById('tableBody').innerHTML='<tr><td colspan="7" class="no-data">Cargando datos...</td></tr>';
  try{
    const r = await fetch('/api/asesores?_t='+Date.now());
    const raw = await r.json();
    // Exclude 'default', sort by registrado desc
    _data = Object.entries(raw)
      .filter(([k])=>k!=='default')
      .map(([slug,d])=>({slug,...d}))
      .sort((a,b)=>new Date(b.registrado||0)-new Date(a.registrado||0));
    renderTable();
  }catch(e){
    document.getElementById('tableBody').innerHTML='<tr><td colspan="7" class="no-data">Error cargando datos: '+e.message+'</td></tr>';
  }
}

function renderTable(){
  const q = (document.getElementById('searchInput').value||'').toLowerCase();
  const filtered = q ? _data.filter(d=>
    (d.nombre||'').toLowerCase().includes(q)||
    (d.slug||'').toLowerCase().includes(q)||
    (d.telefono||d.whatsapp||'').includes(q)
  ) : _data;

  // Update badges
  document.getElementById('totalBadge').textContent = _data.length+' registrado'+(+_data.length===1?'':'s');
  if(_data.length>0){
    const last = _data[0];
    document.getElementById('lastBadge').textContent = 'Último: '+(last.nombre||last.slug);
  }

  if(!filtered.length){
    document.getElementById('tableBody').innerHTML='<tr><td colspan="7" class="no-data">Sin resultados</td></tr>';
    return;
  }

  let html='';
  filtered.forEach((d,i)=>{
    const num = _data.indexOf(d)+1;
    const slug = d.slug||'';
    const nombre = d.nombre||'—';
    const rol = d.rol||'Asesor InnovaIA';
    const tel = d.telefono||d.whatsapp||'—';
    const fecha = formatFecha(d.registrado);
    const link = 'https://www.innovaia.app/?ref='+slug;
    const foto = d.foto ? (d.foto.startsWith('fotos/')?'/'+d.foto:d.foto) : '';

    const avatarHtml = foto
      ? '<img src="'+foto+'" class="avatar" onerror="this.outerHTML=\'<div class=\\'avatar-ph\\'>👤</div>\'">'
      : '<div class="avatar-ph">👤</div>';

    const waHref = 'https://wa.me/'+tel.replace(/[^0-9]/g,'');

    html += '<tr>'
      +'<td style="color:var(--muted);font-size:.8rem;">'+num+'</td>'
      +'<td>'+avatarHtml+'</td>'
      +'<td><div class="name-cell">'+esc(nombre)+'</div><div class="rol-cell">'+esc(rol)+'</div></td>'
      +'<td><span class="slug-pill" onclick="copyLink(\''+slug+'\',this)" title="Click para copiar link">'+esc(slug)+'</span><div class="copy-hint" id="hint-'+i+'">¡Copiado!</div></td>'
      +'<td><a class="wa-link" href="'+waHref+'" target="_blank">'+esc(tel)+'</a></td>'
      +'<td class="date-cell">'+fecha+'</td>'
      +'<td><span class="slug-pill" onclick="copyLink(\''+slug+'\',this)" title="Copiar link">📋 Copiar</span></td>'
      +'</tr>';
  });
  document.getElementById('tableBody').innerHTML=html;
}

function copyLink(slug,el){
  const link='https://www.innovaia.app/?ref='+slug;
  navigator.clipboard.writeText(link).then(()=>{
    const orig=el.textContent;
    el.textContent='¡Copiado!';
    setTimeout(()=>el.textContent=orig,2000);
  });
}

function formatFecha(iso){
  if(!iso)return'—';
  try{
    const d=new Date(iso);
    const opts={day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit',timeZone:'America/Bogota'};
    return d.toLocaleString('es-CO',opts);
  }catch(e){return iso;}
}

function esc(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>
